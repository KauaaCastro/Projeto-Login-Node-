version: '3.8'

services:

  db:
   image: mysql:8.0
   restart: always

   environment: 
    MYSQL_DATABASE: Users_db
    MYSQL_ROOT_PASSWORD: Users_Password023
   
   ports:
    - "3306:3306"
   volumes:
    - "mysql_data:/var/lib/mysql"
    - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
   build: .
   env_file:
   - .env
   ports:
   - "${PORT}:${PORT}"
   container_name: projetologin-app  
   volumes:
     - .:/app
     - /app/node_modules
   command: npm run dev 
   depends_on:
    - db
   environment:
     DB_HOST: db
     DB_USER: root
     DB_PASS: Users_Password023
     DB_NAME: Users_db

volumes:
  mysql_data: 