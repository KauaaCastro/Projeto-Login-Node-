<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login </title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <form action="/" method="post">
        <h1> Login de usuário </h1>

        <label>
            Insira o e-mail:
            <input name="userMail" type="email" placeholder="Ex: emaildeusuario@gmail.com" required>            
        </label>
        
        <label>
            Insira sua senha:
            <input name="userPassword" type="password" placeholder="Ex: userM@il023" required>
        </label>
        <a href="forgotPassword.html" class="redefPassword"> Esqueci minha senha </a>

        <label>
            <button name="reset"> Limpar </button>
            <button name="submit"> Entrar </button>
        </label>
    </form>
    
</body>
</html>
