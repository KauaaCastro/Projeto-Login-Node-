<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinição de senha </title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div>
    <h1> Redefinição de senha </h1>
    <h3> Estamos quase lá! </h3> 
    <h3> Basta criar sua nova senha! </h3> 
    <label>
        Nova senha: 
        <input name="newPassword" type="password" placeholder="Ex: S3nh@S3gur@2032" minlength="8" required>
    </label>
    <label>
        Confirmação da senha:
        <input name="ConfirmPassword" type="password" placeholder="Digite a nova senha novamente" minlength="8" required>
    </label>
    <label>
        <button class="cancel"> Cancelar </button>
        <button name="confirmRedef"> Confirmar senha </button>
    </label>
    </div>
<script src="js/script.js"></script>
</body>
</html
