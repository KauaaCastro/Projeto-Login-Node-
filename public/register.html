<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Registro de Usuário </title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <form>
        <h1> Crie sua Conta </h1>
        <input name="rgName" type="text" placeholder="Insira o nome do usuário" required>
        <input name="rgEmail" type="email" class="userMail" placeholder="Insira seu email" required>
        <input name="rgPassword" type="password" placeholder="Crie uma senha de acesso" minlength="8" required>
        <input name="rgConfirmPw" type="password" placeholder="Confirme sua senha de acesso" minlength="8" required>
        <a href="login.html" class="rgToLogin" > Fazer login </a>

        <br>

        <button name="btn_rgConfirm" type="submit"> Criar conta </button>
        <button name="reset" type="reset"> Limpar </button>    
 
        <script src="/js/script.js"></script>
</body>
</html>
