<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Registro de Usuário </title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <form>
        <h1> Crie sua Conta </h1>
        <input name="rgName" type="text" placeholder="Insira o nome do usuário">
        <input name="rgEmail" type="email" placeholder="Insira seu email">
        <input name="rgPassword" type="password" placeholder="Crie uma senha de acesso">
        <input name="rgConfirmPw" type="password" placeholder="Confirme sua senha de acesso">
        <input name="rgTelefone" type="tel" placeholder="Insira seu número de telefone (opcional)">

    <label>
        <button name="reset" type="reset"> Limpar </button>    
        <button name="rgConfirm" type="submit"> Criar conta </button>
    </label>
    <script src="/js/script.js"></script>
</body>
</html>
