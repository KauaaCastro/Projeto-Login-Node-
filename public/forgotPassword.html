<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Redefinição de senha </title>
    
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <form action="/verify-email" method="post">
    <div>
        <h1> Redefinição de senha </h1>
            Por favor insira o email para redefinição de senha: 
            <label>
                Email:
                <input name="emailConfirmation" type="email" placeholder="Ex: emaildeusuario@gmail.com" required>
            </label>

            <button name="emailRequest"> Confirmar </button>
            <button class="returnButton" name="returnButton" type="button" onclick="window.history.back()"> Voltar </button>
            <script src="js/recovery.js"></script>
    </div>
    </form>
</body>
</html>
